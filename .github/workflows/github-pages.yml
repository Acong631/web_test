name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main  # 这里根据你的默认分支修改，可能是 master 或 main
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        # 重点：--base-href 必须改成你的仓库名，否则刷新页面会 404
        # 假设你的仓库名是 web_test
        run: flutter build web --release --base-href /web_test/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages