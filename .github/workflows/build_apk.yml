name: Build Flutter APK (Debug)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取代码
      - uses: actions/checkout@v4

      # 2. 设置 Java 环境 (Android 编译需要 JDK)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # 根据你的 Android Gradle 版本调整，通常 17 比较稳

      # 3. 设置 Flutter 环境
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 如果你需要特定版本，可以在这里指定 flutter-version: '3.x.x'

      # 4. 获取依赖
      - run: flutter pub get

      # 5. 编译 APK (Debug 模式)
      # 注意：这里没有配置签名，所以只能打 Debug 包
      - run: flutter build apk --debug

      # 6. 上传产物
      # 编译好的 APK 会出现在 Actions 页面的 Artifacts 中供下载
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk